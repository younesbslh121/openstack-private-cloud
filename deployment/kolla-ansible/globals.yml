---
# Kolla-Ansible Global Configuration
# OpenStack Private Cloud — Production-Grade Deployment
# =============================================================

# Base distribution for container images
# Options: centos, debian, rocky, ubuntu
# Using "debian" since our host OS is Debian
kolla_base_distro: "debian"

# Installation type
# Options: binary, source
kolla_install_type: "source"

# OpenStack release
# openstack_release: "2024.2"

# Docker namespace for images
# kolla_namespace: "quay.io/openstack.kolla"

# =============================================================
# NETWORKING CONFIGURATION
# =============================================================

# Management network interface (NIC1 - NAT)
# This is the interface used for API endpoints and internal communication
# NOTE: On Debian, interfaces are typically named:
#   - eth0/eth1 (traditional) or enp0s3/enp0s8 (predictable)
#   Run 'ip -brief link show' on your VM to check actual names
network_interface: "eth0"

# External/public network interface (NIC2 - Host-Only)
# This interface should be UP but WITHOUT an IP address
# Used for Neutron external networks (floating IPs)
neutron_external_interface: "eth1"

# Internal VIP address for HAProxy
# This IP must be unused in your management network
# It will be managed by keepalived for high availability
kolla_internal_vip_address: "192.168.56.250"

# External VIP (same as internal for all-in-one)
# kolla_external_vip_address: "192.168.56.250"

# =============================================================
# NEUTRON CONFIGURATION
# =============================================================

# Neutron ML2 plugin type driver
neutron_plugin_agent: "openvswitch"

# Enable provider networks
enable_neutron_provider_networks: "yes"

# =============================================================
# ENABLE OPENSTACK SERVICES
# =============================================================

# Core services (enabled by default)
enable_keystone: "yes"
enable_nova: "yes"
enable_neutron: "yes"
enable_glance: "yes"
enable_placement: "yes"
enable_horizon: "yes"

# Block Storage
enable_cinder: "yes"
enable_cinder_backend_lvm: "yes"

# Orchestration (Heat)
enable_heat: "yes"

# Object Storage (optional — requires extra disk)
# enable_swift: "yes"

# =============================================================
# CINDER LVM CONFIGURATION
# =============================================================

# Volume group name for Cinder LVM
# You need to create this VG before deploying:
#   sudo pvcreate /dev/sdb
#   sudo vgcreate cinder-volumes /dev/sdb
# Or use a loopback device:
#   sudo dd if=/dev/zero of=/var/lib/cinder/cinder-volumes.img bs=1M count=20480
#   sudo losetup /dev/loop0 /var/lib/cinder/cinder-volumes.img
#   sudo pvcreate /dev/loop0
#   sudo vgcreate cinder-volumes /dev/loop0
cinder_volume_group: "cinder-volumes"

# =============================================================
# HORIZON CONFIGURATION
# =============================================================

# Horizon theme
# horizon_theme: "material"

# =============================================================
# LOGGING & DEBUG
# =============================================================

# Enable central logging (optional)
# enable_central_logging: "yes"

# Debug mode (disable in production)
# openstack_logging_debug: "False"

# =============================================================
# TLS/SSL CONFIGURATION (Optional)
# =============================================================

# Enable TLS for internal API endpoints
# kolla_enable_tls_internal: "yes"
# kolla_enable_tls_external: "yes"

# =============================================================
# NOVA CONFIGURATION
# =============================================================

# Use QEMU if running inside a VM (no nested KVM)
# If your VM supports nested virtualization, change to "kvm"
nova_compute_virt_type: "qemu"

# =============================================================
# KEEPALIVED CONFIGURATION
# =============================================================

# Virtual router ID (change if conflicts with other VRRP instances)
keepalived_virtual_router_id: "51"
