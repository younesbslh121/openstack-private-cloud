version: '3.8'

# ============================================================
# Monitoring Stack — OpenStack Private Cloud
# ============================================================
# Prometheus + Grafana + OpenStack Exporter
# Usage: docker-compose up -d
# ============================================================

services:
  # ---- Prometheus ----
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: openstack-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
    restart: unless-stopped
    networks:
      - monitoring

  # ---- Grafana ----
  grafana:
    image: grafana/grafana:10.4.0
    container_name: openstack-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_INSTALL_PLUGINS=grafana-clock-panel,grafana-piechart-panel
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/var/lib/grafana/dashboards/openstack-overview.json
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
    restart: unless-stopped
    networks:
      - monitoring

  # ---- OpenStack Exporter ----
  openstack-exporter:
    image: niedbalski/openstack-exporter:latest
    container_name: openstack-exporter
    ports:
      - "9180:9180"
    environment:
      - OS_CLIENT_CONFIG_FILE=/etc/openstack/clouds.yaml
    volumes:
      - /etc/kolla/clouds.yaml:/etc/openstack/clouds.yaml:ro
    command:
      - '--cloud'
      - 'kolla-admin'
    restart: unless-stopped
    networks:
      - monitoring

  # ---- Node Exporter (Host Metrics) ----
  node-exporter:
    image: prom/node-exporter:v1.7.0
    container_name: openstack-node-exporter
    ports:
      - "9100:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    restart: unless-stopped
    networks:
      - monitoring

  # ---- cAdvisor (Container Metrics) ----
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: openstack-cadvisor
    ports:
      - "8080:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    privileged: true
    devices:
      - /dev/kmsg
    restart: unless-stopped
    networks:
      - monitoring

volumes:
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

networks:
  monitoring:
    driver: bridge
    name: openstack-monitoring
