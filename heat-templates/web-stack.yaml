heat_template_version: 2021-04-16

description: |
  Web Application Stack — Multiple instances behind a network
  Demonstrates Heat ResourceGroup for scaling
  OpenStack Private Cloud — INPT

parameters:
  image:
    type: string
    default: CirrOS-0.6.2

  flavor:
    type: string
    default: m1.small

  key_name:
    type: string
    default: default-keypair

  external_network:
    type: string
    default: external-net

  instance_count:
    type: number
    label: Instance Count
    description: Number of web servers to deploy
    default: 3
    constraints:
      - range: { min: 1, max: 10 }

  app_port:
    type: number
    label: Application Port
    default: 80

resources:
  # ---- Private Network ----
  app_network:
    type: OS::Neutron::Net
    properties:
      name: heat-web-network

  app_subnet:
    type: OS::Neutron::Subnet
    properties:
      name: heat-web-subnet
      network_id: { get_resource: app_network }
      cidr: "10.20.0.0/24"
      dns_nameservers:
        - "8.8.8.8"
        - "8.8.4.4"
      ip_version: 4

  # ---- Router ----
  app_router:
    type: OS::Neutron::Router
    properties:
      name: heat-web-router
      external_gateway_info:
        network: { get_param: external_network }

  router_interface:
    type: OS::Neutron::RouterInterface
    properties:
      router_id: { get_resource: app_router }
      subnet: { get_resource: app_subnet }

  # ---- Security Group ----
  web_security_group:
    type: OS::Neutron::SecurityGroup
    properties:
      name: heat-web-sg
      description: Security group for Heat web stack
      rules:
        - protocol: tcp
          port_range_min: 22
          port_range_max: 22
          remote_ip_prefix: "0.0.0.0/0"
        - protocol: tcp
          port_range_min: { get_param: app_port }
          port_range_max: { get_param: app_port }
          remote_ip_prefix: "0.0.0.0/0"
        - protocol: tcp
          port_range_min: 443
          port_range_max: 443
          remote_ip_prefix: "0.0.0.0/0"
        - protocol: icmp
          remote_ip_prefix: "0.0.0.0/0"

  # ---- Web Server Group ----
  web_servers:
    type: OS::Heat::ResourceGroup
    depends_on: router_interface
    properties:
      count: { get_param: instance_count }
      resource_def:
        type: OS::Nova::Server
        properties:
          name: heat-web-%index%
          image: { get_param: image }
          flavor: { get_param: flavor }
          key_name: { get_param: key_name }
          networks:
            - network: { get_resource: app_network }
          security_groups:
            - { get_resource: web_security_group }
          metadata:
            orchestration: heat
            stack_type: web-stack
            index: "%index%"
          user_data_format: RAW
          user_data:
            str_replace:
              template: |
                #!/bin/bash
                echo "============================================"
                echo "  Web Server INDEX — Heat Stack"
                echo "  OpenStack Private Cloud — INPT"
                echo "============================================"
                
                # Install web server (if package manager available)
                if command -v apt-get &>/dev/null; then
                  apt-get update -y
                  apt-get install -y nginx
                  
                  cat > /var/www/html/index.html << 'EOF'
                  <!DOCTYPE html>
                  <html>
                  <head>
                    <title>Heat Web Stack — Server INDEX</title>
                    <style>
                      body {
                        font-family: 'Segoe UI', sans-serif;
                        background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
                        color: #fff; display: flex;
                        justify-content: center; align-items: center;
                        min-height: 100vh; margin: 0;
                      }
                      .card {
                        background: rgba(255,255,255,0.08);
                        backdrop-filter: blur(15px);
                        border-radius: 24px;
                        padding: 50px; text-align: center;
                        border: 1px solid rgba(255,255,255,0.15);
                        box-shadow: 0 25px 50px rgba(0,0,0,0.3);
                      }
                      h1 { font-size: 2em; background: linear-gradient(90deg, #e94560, #ff6b6b);
                        -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
                      .badge { background: #e94560; padding: 6px 18px;
                        border-radius: 20px; font-size: 0.85em; margin: 4px;
                        display: inline-block; }
                      .info { color: #8888aa; margin-top: 15px; }
                    </style>
                  </head>
                  <body>
                    <div class="card">
                      <h1>☁️ Heat Web Stack</h1>
                      <p>Server <strong>INDEX</strong></p>
                      <p>
                        <span class="badge">Heat</span>
                        <span class="badge">OpenStack</span>
                        <span class="badge">Kolla-Ansible</span>
                      </p>
                      <p class="info">Orchestrated by Heat HOT Template</p>
                      <p class="info">INPT — Private Cloud Project</p>
                    </div>
                  </body>
                  </html>
                  EOF
                  
                  systemctl enable nginx && systemctl restart nginx
                fi
              params:
                INDEX: "%index%"

outputs:
  web_server_ips:
    description: Private IP addresses of all web servers
    value: { get_attr: [web_servers, first_address] }

  network_id:
    description: ID of the app network
    value: { get_resource: app_network }

  stack_summary:
    description: Stack deployment summary
    value:
      str_replace:
        template: |
          ============================================
          Heat Web Stack — Deployment Summary
          ============================================
          Instances: COUNT web servers deployed
          Network: heat-web-network (10.20.0.0/24)
          Router: heat-web-router → external-net
          Security: SSH, HTTP, HTTPS, ICMP
          ============================================
        params:
          COUNT: { get_param: instance_count }
